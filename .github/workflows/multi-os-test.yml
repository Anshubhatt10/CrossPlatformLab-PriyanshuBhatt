name: Multi-OS Testing - Priyanshu Bhatt

on:
  push:
    branches:
      - master

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest

    steps:
      - name: Print Ubuntu start message
        run: echo "Testing on Ubuntu..."

      - name: Display Ubuntu OS information
        run: |
          uname -a
          cat /etc/os-release

      - name: Create Ubuntu test file
        run: echo "Ubuntu test by Priyanshu Bhatt" > test-ubuntu.txt

      - name: Display Ubuntu test file
        run: cat test-ubuntu.txt

      - name: Print Ubuntu completion message
        run: echo "Ubuntu tests completed"

  test-windows:
    runs-on: windows-latest

    steps:
      - name: Print Windows start message
        shell: pwsh
        run: |
          Write-Output "Testing on Windows..."

      - name: Display Windows OS information
        shell: pwsh
        run: |
          Get-ComputerInfo | Select-Object OsName, OsVersion, WindowsVersion

      - name: Create Windows test file
        shell: pwsh
        run: |
          "Windows test by Priyianshu Bhatt" | Out-File -FilePath test-windows.txt

      - name: Display Windows test file
        shell: pwsh
        run: |
          Get-Content test-windows.txt

      - name: Print Windows completion message
        shell: pwsh
        run: |
          Write-Output "Windows tests completed"
